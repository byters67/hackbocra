# ═══════════════════════════════════════════════════════════════════════════════
# BOCRA Website — Production Nginx Configuration
# ═══════════════════════════════════════════════════════════════════════════════
#
# This configuration addresses penetration test findings F07 and F08, and
# follows OWASP Secure Headers Project recommendations.
#
# Deployment: This file is used when the BOCRA website is self-hosted behind
# Nginx (e.g., on a government VPS or cloud VM). For the hackathon demo,
# the site is served via GitHub Pages with CSP enforced via <meta> tag.
#
# Usage:
#   1. Place built SPA files in /var/www/bocra/
#   2. Copy this file to /etc/nginx/sites-available/bocra.conf
#   3. ln -s /etc/nginx/sites-available/bocra.conf /etc/nginx/sites-enabled/
#   4. sudo nginx -t && sudo systemctl reload nginx
#
# TLS certificates: Use Let's Encrypt (certbot --nginx -d bocra.org.bw)
# ═══════════════════════════════════════════════════════════════════════════════

# ─── Rate Limiting (F01: Prevent brute-force / abuse) ─────────────────────────
limit_req_zone $binary_remote_addr zone=general:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=auth:10m     rate=5r/m;

# ─── Redirect HTTP → HTTPS ───────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name bocra.org.bw www.bocra.org.bw;

    # ACME challenge for Let's Encrypt certificate renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS Server Block ──────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name bocra.org.bw www.bocra.org.bw;

    # ─── TLS Configuration ───────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/bocra.org.bw/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bocra.org.bw/privkey.pem;

    # Modern TLS only (TLS 1.2+, no SSLv3/TLS 1.0/1.1)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers on;

    # OCSP Stapling — faster TLS handshakes
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ─── Document Root ───────────────────────────────────────────────────
    root /var/www/bocra;
    index index.html;

    # ═══════════════════════════════════════════════════════════════════════
    # SECURITY HEADERS — Addressing F07 & F08
    # Single source of truth: nginx/snippets/security-headers.conf
    # ═══════════════════════════════════════════════════════════════════════

    # F07: Hide server version information
    server_tokens off;

    # Server-level security headers (inherited by location blocks that
    # do NOT use their own add_header directives)
    include /etc/nginx/snippets/security-headers.conf;

    # ═══════════════════════════════════════════════════════════════════════
    # SPA ROUTING — React Router support
    # ═══════════════════════════════════════════════════════════════════════

    location / {
        limit_req zone=general burst=10 nodelay;
        try_files $uri $uri/ /index.html;
    }

    # ─── Static Assets — long-lived cache (Vite hashes filenames) ────────
    # NOTE: Any add_header in a location block silently drops ALL parent
    # add_header directives (Nginx inheritance rule). We must repeat the
    # security headers here, or use 'always' on the parent + avoid
    # add_header in child blocks. We use the "always" parent approach +
    # only set Cache-Control via expires/headers_more to avoid duplication.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        # Re-declare security headers (Nginx drops parent add_header in
        # location blocks that define their own — include the shared snippet)
        include /etc/nginx/snippets/security-headers.conf;
        access_log off;
    }

    # ─── Documents / PDFs ────────────────────────────────────────────────
    location /documents/ {
        expires 7d;
        add_header Cache-Control "public" always;
        # Re-declare security headers (same Nginx inheritance issue)
        include /etc/nginx/snippets/security-headers.conf;
    }

    # ─── Block sensitive files from being served ─────────────────────────
    location ~ /\.(env|git|htaccess|DS_Store) {
        deny all;
        return 404;
    }

    # ─── Block access to source maps in production ───────────────────────
    location ~* \.map$ {
        deny all;
        return 404;
    }

    # ─── Gzip Compression ────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ─── Security: Request size limits ───────────────────────────────────
    client_max_body_size 10M;
    client_body_timeout 10s;
    client_header_timeout 10s;

    # ─── Logging ─────────────────────────────────────────────────────────
    access_log /var/log/nginx/bocra_access.log;
    error_log  /var/log/nginx/bocra_error.log warn;
}
