# ═══════════════════════════════════════════════════════════════════════════════
# BOCRA — Shared Security Headers Snippet
# ═══════════════════════════════════════════════════════════════════════════════
#
# Included in every location block that uses add_header (which drops parent
# headers due to Nginx inheritance rules).
#
# ⚠ CSP SYNC: Also update index.html (meta tag) and public/_headers when
#   changing the Content-Security-Policy value.
# ═══════════════════════════════════════════════════════════════════════════════

# F08: HSTS — Force HTTPS for 1 year, include subdomains, allow preload
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

# F08: Prevent clickjacking — deny all framing of BOCRA pages
add_header X-Frame-Options "DENY" always;

# F08: Content Security Policy — whitelist allowed resource origins
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.google.com https://www.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://*.supabase.co https://*.openstreetmap.org; connect-src 'self' https://*.supabase.co https://www.google.com; frame-src 'self' https://*.openstreetmap.org https://www.google.com; object-src 'none'; base-uri 'self'; form-action 'self';" always;

# F08: Prevent MIME-type sniffing attacks
add_header X-Content-Type-Options "nosniff" always;

# F08: Control referrer information leakage
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# F08: Restrict browser features/permissions
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=()" always;

# Cross-origin isolation headers
add_header X-Permitted-Cross-Domain-Policies "none" always;
add_header Cross-Origin-Embedder-Policy "credentialless" always;
add_header Cross-Origin-Opener-Policy "same-origin" always;
add_header Cross-Origin-Resource-Policy "same-origin" always;
