<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Botswana Communications Regulatory Authority - Regulating telecommunications, broadcasting, postal and internet services in Botswana" />
  <meta name="theme-color" content="#00458B" />

  <!-- ═══ F08 REMEDIATION: Content Security Policy (meta tag) ═══ -->
  <!-- GitHub Pages does not support custom HTTP headers, so we enforce -->
  <!-- CSP via meta tag. HSTS/X-Frame-Options require server headers   -->
  <!-- and are configured in nginx/nginx.conf for production deployment -->
  <!-- ⚠ CSP SYNC: This policy is duplicated in 3 locations:           -->
  <!--   1. HERE (index.html meta tag — used on GitHub Pages)           -->
  <!--   2. public/_headers (reference/Netlify format)                  -->
  <!--   3. nginx/nginx.conf (production server)                        -->
  <!-- When updating CSP directives, update ALL THREE locations.        -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' 'unsafe-inline' https://www.google.com https://www.gstatic.com;
    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
    font-src 'self' https://fonts.gstatic.com;
    img-src 'self' data: https://*.supabase.co https://*.openstreetmap.org;
    connect-src 'self' https://*.supabase.co wss://*.supabase.co https://www.google.com https://api.anthropic.com https://services.nvd.nist.gov https://dns.google https://fonts.googleapis.com https://fonts.gstatic.com;
    frame-src 'self' https://*.openstreetmap.org https://www.google.com;
    object-src 'none';
    base-uri 'self';
    form-action 'self';
  " />

  <!-- Open Graph -->
  <meta property="og:title" content="BOCRA - Botswana Communications Regulatory Authority" />
  <meta property="og:description" content="Regulating telecommunications, broadcasting, postal and internet services in Botswana" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://byters67.github.io/hackbocra/" />

  <title>BOCRA - Botswana Communications Regulatory Authority</title>

  <!-- PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="BOCRA" />
  <link rel="apple-touch-icon" href="/hackbocra/icons/icon-192.png" />

  <!-- Favicon (BOCRA blue) -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='8' cy='24' r='5' fill='%2300A6CE'/%3E%3Ccircle cx='16' cy='24' r='5' fill='%23C8237B'/%3E%3Ccircle cx='24' cy='24' r='5' fill='%23F7B731'/%3E%3Ccircle cx='20' cy='24' r='5' fill='%236BBE4E'/%3E%3Ctext x='16' y='16' text-anchor='middle' font-size='14' font-weight='bold' fill='%2300458B' font-family='sans-serif'%3EB%3C/text%3E%3C/svg%3E" />

  <!-- Google Fonts: DM Serif Display + Plus Jakarta Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- GitHub Pages SPA redirect handler -->
  <!-- Picks up the redirect stored by 404.html and restores the original URL -->
  <script>
    (function() {
      var redirect = sessionStorage.redirect;
      delete sessionStorage.redirect;
      if (redirect && redirect !== location.href) {
        history.replaceState(null, null, redirect);
      }
    })();
  </script>
  <!-- Google reCAPTCHA v3 -->
  <script src="https://www.google.com/recaptcha/api.js?render=6LdQpZIsAAAAAOcSTO1ysgiemlV7HwC_1aej1jwz" async defer></script>
</head>
<body class="bg-bocra-off-white text-bocra-slate antialiased">
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
